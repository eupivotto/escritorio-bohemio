# ============================================================
# PHASE 1 — HTTP only (before SSL cert is obtained)
# Active path:  /opt/actions-runner/_work/portal-efte/portal-efte/nginx/conf.d/bohemio.conf
# ============================================================
server {
    listen 80;
    server_name escritoriodebohemio.com.br www.escritoriodebohemio.com.br;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://172.18.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

